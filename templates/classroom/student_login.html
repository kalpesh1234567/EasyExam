{% extends 'base.html' %}
{% block title %}Student Login – EasyExam{% endblock %}
{% block content %}
<div class="page-sm">
  <div class="card" style="margin-top:1rem;">
    <div style="text-align:center;margin-bottom:2rem;">
      <div style="font-size:2.5rem;margin-bottom:0.5rem;">👨‍🎓</div>
      <h1 style="font-size:1.5rem;font-weight:800;">Student Portal</h1>
      <p style="color:var(--muted);font-size:0.875rem;margin-top:4px;">Sign in to your Student account</p>
    </div>

    {% if form.errors %}
      <div class="alert alert-error">Invalid username or password.</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label for="id_username">Username</label>
        <input type="text" name="username" id="id_username" class="form-input" placeholder="Enter your username" autofocus required />
      </div>
      <div class="form-group">
        <label for="id_password">Password</label>
        <input type="password" name="password" id="id_password" class="form-input" placeholder="Enter your password" required />
      </div>
      <button type="submit" class="btn btn-primary btn-block" style="margin-top:0.5rem;">Sign In</button>
    </form>

    <div style="text-align:center;margin-top:1.5rem;color:var(--muted);font-size:0.875rem;">
      Don't have an account? <a href="{% url 'student_signup' %}" style="color:var(--accent);font-weight:600;">Student Sign Up</a>
    </div>
  </div>
</div>
{% endblock %}
